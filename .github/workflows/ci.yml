name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test

      - name: Set up Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Allure commandline
        if: always()
        run: |
          curl -sL -o allure.zip https://github.com/allure-framework/allure2/releases/download/2.39.0/allure-2.39.0.zip
          unzip -qq allure.zip -d /opt/
          echo "/opt/allure-2.39.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Generate common results.json
        if: always()
        run: node scripts/generate-results-summary.js

      - name: Upload results.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-json
          path: results.json
          retention-days: 30

      - name: Upload Allure report for Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy Allure report to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4